<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KG 이니시스 간편인증 (Mock)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        
        .mock-badge {
            background: #ffc107;
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }
        
        .info-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e9ecef;
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #666;
            font-size: 14px;
        }
        
        .info-value {
            color: #333;
            font-weight: 500;
            font-size: 14px;
            word-break: break-all;
            text-align: right;
            max-width: 60%;
        }
        
        .form-section {
            margin-bottom: 25px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            color: #555;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .test-users {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .test-user-btn {
            padding: 12px;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }
        
        .test-user-btn:hover {
            background: #e9ecef;
            border-color: #667eea;
        }
        
        .test-user-name {
            font-weight: 600;
            color: #333;
        }
        
        .test-user-info {
            color: #666;
            font-size: 11px;
            margin-top: 4px;
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }
        
        button {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }
        
        .btn-failure {
            background: #dc3545;
            color: white;
        }
        
        .btn-failure:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3);
        }
        
        .note {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 12px;
            margin-top: 20px;
            font-size: 13px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🔐 KG 이니시스</div>
            <div class="subtitle">간편인증 서비스</div>
            <span class="mock-badge">테스트 서버</span>
        </div>
        
        <div class="info-box">
            <div class="info-item">
                <span class="info-label">상점 ID</span>
                <span class="info-value" th:text="${request.mid}">CIC12345678</span>
            </div>
            <div class="info-item" th:if="${request.moid}">
                <span class="info-label">거래번호</span>
                <span class="info-value" th:text="${request.moid}">240209123045AB12CD</span>
            </div>
            <div class="info-item" th:if="${request.phoneNo}">
                <span class="info-label">휴대폰</span>
                <span class="info-value" th:text="${request.phoneNo}">010-1234-5678</span>
            </div>
        </div>
        
        <form id="authForm" th:action="@{/auth/process}" method="post">
            <input type="hidden" name="mid" th:value="${request.mid}">
            <input type="hidden" name="returnUrl" th:value="${request.returnUrl}">
            <input type="hidden" name="reqSvcCd" th:value="${request.reqSvcCd}">
            <input type="hidden" name="moid" th:value="${request.moid}">
            <input type="hidden" name="state" th:value="${request.state}">
            <input type="hidden" name="phoneNo" th:value="${request.phoneNo}">
            <input type="hidden" name="birthDate" th:value="${request.birthDate}">
            <input type="hidden" name="action" id="actionInput" value="">
            
            <div class="form-section">
                <div class="section-title">📋 테스트 사용자 선택</div>
                <div class="test-users">
                    <div class="test-user-btn" th:each="user : ${testUsers}" 
                         th:data-name="${user[0]}" th:data-birth="${user[1]}" th:data-phone="${user[2]}"
                         onclick="selectUser(this)">
                        <div class="test-user-name" th:text="${user[0]}">홍길동</div>
                        <div class="test-user-info" th:text="${user[1]}">1990.01.01</div>
                    </div>
                </div>
            </div>
            
            <div class="form-section">
                <div class="section-title">✏️ 또는 직접 입력</div>
                <div class="form-group">
                    <label>이름</label>
                    <input type="text" name="name" id="nameInput" placeholder="홍길동">
                </div>
                <div class="form-group">
                    <label>생년월일</label>
                    <input type="text" name="selectedBirthDate" id="birthDateInput" 
                           placeholder="19900101" maxlength="8">
                </div>
                <div class="form-group">
                    <label>휴대폰 번호</label>
                    <input type="text" name="selectedPhoneNo" id="phoneNoInput" 
                           placeholder="01012345678" maxlength="11">
                </div>
            </div>
            
            <div class="form-section">
                <div class="section-title">❌ 실패 사유 (실패 선택시)</div>
                <div class="form-group">
                    <select name="failureReason" id="failureReason">
                        <option value="사용자 인증 취소">사용자 인증 취소</option>
                        <option value="본인확인 실패">본인확인 실패</option>
                        <option value="타임아웃">타임아웃</option>
                        <option value="시스템 오류">시스템 오류</option>
                    </select>
                </div>
            </div>
            
            <div class="button-group">
                <button type="button" class="btn-success" onclick="submitForm('success')">
                    ✓ 인증 성공
                </button>
                <button type="button" class="btn-failure" onclick="submitForm('failure')">
                    ✗ 인증 실패
                </button>
            </div>
        </form>
        
        <div class="note">
            💡 테스트 서버입니다. 실제 본인인증은 수행되지 않습니다.
        </div>
    </div>
    
    <script>
        function selectUser(element) {
            const name = element.getAttribute('data-name');
            const birthDate = element.getAttribute('data-birth');
            const phoneNo = element.getAttribute('data-phone');
            document.getElementById('nameInput').value = name;
            document.getElementById('birthDateInput').value = birthDate;
            document.getElementById('phoneNoInput').value = phoneNo;
        }
        
        function submitForm(action) {
            document.getElementById('actionInput').value = action;
            document.getElementById('authForm').submit();
        }
    </script>
</body>
</html>
